<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>포토 갤러리</title>

<style>

body{
font-family:Arial;
background:#111;
color:white;
margin:0;
}

.navbar{
display:flex;
justify-content:space-between;
align-items:center;
padding:14px 40px;

background:rgba(20,20,20,0.8);
backdrop-filter:blur(10px);

border-bottom:1px solid rgba(255,255,255,0.05);

position:sticky;
top:0;
z-index:1000;
}

.logo{
font-size:18px;
font-weight:600;
letter-spacing:1px;
color:white;
}

.nav-links{
display:flex;
gap:30px;
}

.nav-links a{
color:#d0d0d0;
text-decoration:none;
font-size:15px;
position:relative;
transition:0.25s;
}

.nav-links a:hover{
color:white;
}

.nav-links a::after{
content:"";
position:absolute;
left:0;
bottom:-6px;
width:0%;
height:2px;
background:#7aa2ff;
transition:0.3s;
}

.nav-links a:hover::after{
width:100%;
}

h1{
padding:15px 0px 0px 25px;
margin:0;
font-size:1.5em;

}

.gallery{
display:grid;
grid-template-columns:repeat(auto-fill,200px);
gap:10px;
padding:20px;
}

.gallery img{
width:100%;
border-radius:10px;
cursor:pointer;
transition:0.2s;
}

.gallery img:hover{
transform:scale(1.05);
}

.nav-links a.active{
color:white;

text-shadow:
0 0 4px rgba(122,162,255,0.9),
0 0 10px rgba(122,162,255,0.6),
0 0 20px rgba(122,162,255,0.4);
}

.nav-links a.active::after{
width:100%;
}

.logo-area{
display:flex;
align-items:center;
gap:12px;
}

.home-btn{
font-size:24px;
display:inline-block;
transform:scaleX(1.3);
text-decoration:none;
color:#d0d0d0;
transition:0.2s;
}

.home-btn:hover{
color:white;
text-shadow:
0 0 6px rgba(122,162,255,0.8),
0 0 12px rgba(122,162,255,0.6);
}
.image-popup{

display:none;

position:fixed;
top:0;
left:0;

width:100%;
height:100%;

background:rgba(0,0,0,0.9);

justify-content:center;
align-items:center;

z-index:9999;
}

.image-popup img{

max-width:100%;
max-height:100%;

border-radius:10px;
}

.close-btn{

position:absolute;
top:30px;
right:40px;

font-size:30px;
color:white;

cursor:pointer;
}

</style>
</head>

<div id="imagePopup" class="image-popup">

<span class="close-btn" onclick="closeImage()">✕</span>

<img id="popupImg">

</div>

<body>

<nav class="navbar">

<div class="logo-area">

<a href="index.html" class="home-btn">⌂</a>

  <div class="logo"> </div>

  <div class="nav-links">
    <a href="index.html">컬러 텍스트</a>
    <a href="index.html" class="active">포토 갤러리</a>
  </div>
</nav>

<h1>🚧 준비 중</h1>

<div class="gallery">

<img src="thumb1.jpg" onclick="openImage('big1.jpg')">
<img src="thumb2.jpg" onclick="openImage('big2.jpg')">
<img src="thumb3.jpg" onclick="openImage('big3.jpg')">

</div>

<script>

function openImage(src){

const popup = document.getElementById("imagePopup");
const img = document.getElementById("popupImg");

img.src = src;
popup.style.display = "flex";

}

function closeImage(){

document.getElementById("imagePopup").style.display = "none";

}

document.addEventListener("keydown", function(e){
if(e.key === "Escape"){
closeImage();
}
});

document.getElementById("imagePopup").onclick = closeImage;

</script>

</body>
</html>
